// state: {eventName: {keep: bool, articles: {artId: bool}}}
const state = {};
DATA.forEach(([eventName, articles]) => {
  state[eventName] = { keep: true, articles: {} };
  articles.forEach(a => { state[eventName].articles[a.article_id] = true; });
});

function updateCount() {
  let events = 0, articles = 0;
  Object.entries(state).forEach(([e, s]) => {
    if (s.keep) {
      events++;
      Object.values(s.articles).forEach(v => { if (v) articles++; });
    }
  });
  document.getElementById('liveCount').textContent = `保留: ${events} 个事件, ${articles} 篇文章`;
  document.getElementById('stats').textContent =
    `共 ${DATA.length} 个事件, ${DATA.reduce((s,g)=>s+g[1].length,0)} 篇文章 | 点击事件名展开/收起, 点击复选框移除不相关的`;
}

function toggleEvent(eventName) {
  const s = state[eventName];
  s.keep = !s.keep;
  // 同步所有文章
  Object.keys(s.articles).forEach(k => { s.articles[k] = s.keep; });
  renderGroup(eventName);
  updateCount();
}

function toggleArticle(eventName, artId) {
  state[eventName].articles[artId] = !state[eventName].articles[artId];
  // 如果所有文章都被移除，事件也标记为移除
  const allRemoved = Object.values(state[eventName].articles).every(v => !v);
  state[eventName].keep = !allRemoved;
  renderGroup(eventName);
  updateCount();
}

function toggleExpand(eventName) {
  const el = document.getElementById('arts-' + eventName.replace(/[^a-zA-Z0-9]/g, '_'));
  if (el) el.classList.toggle('open');
}

function renderGroup(eventName) {
  const el = document.getElementById('grp-' + eventName.replace(/[^a-zA-Z0-9]/g, '_'));
  if (!el) return;
  const s = state[eventName];
  el.classList.toggle('removed', !s.keep);
  // update event toggle
  const toggle = el.querySelector('.event-toggle');
  toggle.className = 'event-toggle ' + (s.keep ? 'checked' : 'unchecked');
  toggle.textContent = s.keep ? '✓' : '✗';
  // update article checks
  el.querySelectorAll('.article-row').forEach(row => {
    const artId = parseInt(row.dataset.artId);
    const checked = s.articles[artId];
    row.classList.toggle('removed', !checked);
    const check = row.querySelector('.art-check');
    check.className = 'art-check ' + (checked ? 'checked' : 'unchecked');
    check.textContent = checked ? '✓' : '✗';
  });
}

function removeUnchecked() {
  document.querySelectorAll('.event-group.removed').forEach(el => { el.style.display = 'none'; });
  document.querySelectorAll('.article-row.removed').forEach(el => { el.style.display = 'none'; });
}

function exportResult() {
  const result = {};
  Object.entries(state).forEach(([eventName, s]) => {
    if (!s.keep) return;
    const kept = Object.entries(s.articles).filter(([_,v])=>v).map(([k,_])=>parseInt(k));
    if (kept.length > 0) result[eventName] = kept;
  });
  const blob = new Blob([JSON.stringify(result, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'reviewed_events.json';
  a.click();
  alert(`已导出 ${Object.keys(result).length} 个事件`);
}

// render
const container = document.getElementById('container');
DATA.forEach(([eventName, articles]) => {
  const safeId = eventName.replace(/[^a-zA-Z0-9]/g, '_');
  const div = document.createElement('div');
  div.className = 'event-group';
  div.id = 'grp-' + safeId;
  div.innerHTML = `
    <div class="event-header">
      <div class="event-toggle checked" onclick="event.stopPropagation();toggleEvent('${eventName.replace(/'/g,"\\'")}')">✓</div>
      <div class="event-name" onclick="toggleExpand('${eventName.replace(/'/g,"\\'")}')">${eventName}</div>
      <span class="event-count">${articles.length} 篇</span>
      <button class="expand-btn" onclick="toggleExpand('${eventName.replace(/'/g,"\\'")}')">▼</button>
    </div>
    <div class="articles" id="arts-${safeId}">
      ${articles.map(a => `
        <div class="article-row" data-art-id="${a.article_id}">
          <div class="art-check checked" onclick="toggleArticle('${eventName.replace(/'/g,"\\'")}', ${a.article_id})">✓</div>
          <span class="art-id">#${a.article_id}</span>
          <span class="art-date">${a.published_at || ''}</span>
          <span class="art-entities">${(a.entities||[]).join(', ')}</span>
          <span class="art-title">${(a.title||'').substring(0,80)}</span>
        </div>
      `).join('')}
    </div>
  `;
  container.appendChild(div);
});
updateCount();
</script>
